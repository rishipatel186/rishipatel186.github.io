<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Analytics Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        header {
            text-align: center;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        header h1 { 
            font-size: 2.5em; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }
        
        .last-updated { color: #a0c4ff; font-size: 0.9em; }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }
        
        .stat-card:hover { transform: translateY(-5px); }
        
        .stat-card .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .stat-card .label { color: #a0c4ff; font-size: 0.9em; }
        
        /* Filters */
        .filters {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filters input, .filters select {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.9);
            font-size: 1em;
        }
        
        .filters input { flex: 1; min-width: 200px; }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #00d4ff;
            color: #1e3c72;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover { background: #fff; transform: scale(1.05); }
        
        /* Table */
        .table-container {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            color: #333;
        }
        
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        th {
            padding: 18px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 15px 18px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 0.95em;
        }
        
        tr:hover { background: #f5f5f5; }
        
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }
        
        .badge-desktop { background: #e3f2fd; color: #1976d2; }
        .badge-mobile { background: #f3e5f5; color: #7b1fa2; }
        .badge-tablet { background: #e8f5e9; color: #388e3c; }
        
        .ip-address {
            font-family: 'Courier New', monospace;
            background: #f5f5f5;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
        }
        
        .device-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .device-icon { font-size: 1.3em; }
        
        .time-stamp {
            color: #666;
            font-size: 0.9em;
        }
        
        .location {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .flag { font-size: 1.2em; }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: #d32f2f;
        }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            th, td { padding: 10px; font-size: 0.85em; }
            .table-container { overflow-x: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Visitor Analytics Dashboard</h1>
            <p class="last-updated">Last Updated: <span id="lastUpdate">-</span></p>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">👥</div>
                <div class="number" id="totalVisitors">0</div>
                <div class="label">Total Visitors</div>
            </div>
            <div class="stat-card">
                <div class="icon">🌍</div>
                <div class="number" id="uniqueIPs">0</div>
                <div class="label">Unique IPs</div>
            </div>
            <div class="stat-card">
                <div class="icon">📱</div>
                <div class="number" id="mobileVisitors">0</div>
                <div class="label">Mobile Visitors</div>
            </div>
            <div class="stat-card">
                <div class="icon">💻</div>
                <div class="number" id="desktopVisitors">0</div>
                <div class="label">Desktop Visitors</div>
            </div>
            <div class="stat-card">
                <div class="icon">🌐</div>
                <div class="number" id="topCountry">-</div>
                <div class="label">Top Region</div>
            </div>
            <div class="stat-card">
                <div class="icon">⏰</div>
                <div class="number" id="todayCount">0</div>
                <div class="label">Today's Visits</div>
            </div>
        </div>
        
        <div class="filters">
            <input type="text" id="searchInput" placeholder="Search by IP, device, or location...">
            <select id="deviceFilter">
                <option value="">All Devices</option>
                <option value="mobile">Mobile</option>
                <option value="desktop">Desktop</option>
                <option value="tablet">Tablet</option>
            </select>
            <button class="btn" onclick="loadData()">🔄 Refresh</button>
            <button class="btn" onclick="exportData()">📥 Export CSV</button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>IP Address</th>
                        <th>Device</th>
                        <th>Screen</th>
                        <th>Browser</th>
                        <th>Referrer</th>
                    </tr>
                </thead>
                <tbody id="visitorTable">
                    <tr><td colspan="6" class="loading">Loading visitor data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Optional server-side collector URL (leave empty to use localStorage-only)
        const COLLECTOR_URL = '';

        const VISITOR_STORAGE_KEY = 'site_visitor_logs';
        
        let allVisitors = [];
        
        function readVisitorsFromLocalStorage() {
            try {
                const raw = localStorage.getItem(VISITOR_STORAGE_KEY);
                const parsed = raw ? JSON.parse(raw) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        async function loadData() {
            try {
                document.getElementById('visitorTable').innerHTML = 
                    '<tr><td colspan="6" class="loading">Loading...</td></tr>';
                if (COLLECTOR_URL) {
                    const resp = await fetch(COLLECTOR_URL).catch(() => null);
                    if (resp && resp.ok) {
                        try {
                            allVisitors = await resp.json();
                        } catch {
                            allVisitors = readVisitorsFromLocalStorage();
                        }
                    } else {
                        allVisitors = readVisitorsFromLocalStorage();
                    }
                } else {
                    allVisitors = readVisitorsFromLocalStorage();
                }
                
                // Sort by time (newest first)
                allVisitors.sort((a, b) => new Date(b.time) - new Date(a.time));
                
                updateStats();
                renderTable(allVisitors);
                
                document.getElementById('lastUpdate').textContent = new Date().toLocaleString();
                
            } catch (error) {
                document.getElementById('visitorTable').innerHTML = 
                    `<tr><td colspan="6" class="error">
                        Error: ${error.message}
                    </td></tr>`;
            }
        }
        
        function updateStats() {
            document.getElementById('totalVisitors').textContent = allVisitors.length;
            
            // In local mode, IP may not exist. Fall back to session ID for uniqueness.
            const uniqueIPs = new Set(allVisitors.map(v => {
                if (v.ip && v.ip !== 'Not available in local mode') return v.ip;
                return v.sessionId || v.id;
            })).size;
            document.getElementById('uniqueIPs').textContent = uniqueIPs;
            
            // Device counts
            const mobile = allVisitors.filter(v => detectDevice(v.userAgent).type === 'mobile').length;
            const desktop = allVisitors.filter(v => detectDevice(v.userAgent).type === 'desktop').length;
            document.getElementById('mobileVisitors').textContent = mobile;
            document.getElementById('desktopVisitors').textContent = desktop;

            const topRegion = getTopRegion(allVisitors);
            document.getElementById('topCountry').textContent = topRegion;
            
            // Today's count
            const today = new Date().toDateString();
            const todayCount = allVisitors.filter(v => 
                new Date(v.time).toDateString() === today
            ).length;
            document.getElementById('todayCount').textContent = todayCount;
        }

        function getTopRegion(visitors) {
            const regionCounts = visitors.reduce((acc, visitor) => {
                const timezone = visitor.timezone || '';
                const region = timezone.includes('/') ? timezone.split('/')[0] : 'Unknown';
                acc[region] = (acc[region] || 0) + 1;
                return acc;
            }, {});

            const topEntry = Object.entries(regionCounts)
                .sort((a, b) => b[1] - a[1])[0];

            return topEntry ? topEntry[0] : '-';
        }
        
        function renderTable(data) {
            const tbody = document.getElementById('visitorTable');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="loading">No visitors yet</td></tr>';
                return;
            }
            
            tbody.innerHTML = data.map(visitor => {
                const time = new Date(visitor.time).toLocaleString();
                const device = detectDevice(visitor.userAgent);
                const browser = detectBrowser(visitor.userAgent);
                
                return `
                    <tr>
                        <td class="time-stamp">${time}</td>
                        <td><span class="ip-address">${visitor.ip || 'Unknown'}</span></td>
                        <td>
                            <div class="device-info">
                                <span class="device-icon">${device.icon}</span>
                                <span class="badge badge-${device.type}">${device.type}</span>
                            </div>
                        </td>
                        <td>${visitor.screen || '-'}</td>
                        <td>${browser}</td>
                        <td>${truncate(visitor.referrer, 30)}</td>
                    </tr>
                `;
            }).join('');
        }
        
        function detectDevice(ua) {
            if (!ua) return {type: 'unknown', icon: '❓'};
            if (/Mobile|Android|iPhone|iPad|iPod/.test(ua)) {
                return /iPad|Tablet/.test(ua) ? 
                    {type: 'tablet', icon: '📱'} : 
                    {type: 'mobile', icon: '📱'};
            }
            return {type: 'desktop', icon: '💻'};
        }
        
        function detectBrowser(ua) {
            if (!ua) return 'Unknown';
            if (ua.includes('Edg')) return 'Edge';
            if (ua.includes('Chrome')) return 'Chrome';
            if (ua.includes('Firefox')) return 'Firefox';
            if (ua.includes('Safari')) return 'Safari';
            return 'Other';
        }
        
        function truncate(str, len) {
            if (!str) return '-';
            return str.length > len ? str.substring(0, len) + '...' : str;
        }
        
        function filterData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const deviceType = document.getElementById('deviceFilter').value;
            
            let filtered = allVisitors;
            
            if (search) {
                filtered = filtered.filter(v => 
                    JSON.stringify(v).toLowerCase().includes(search)
                );
            }
            
            if (deviceType) {
                filtered = filtered.filter(v => 
                    detectDevice(v.userAgent).type === deviceType
                );
            }
            
            renderTable(filtered);
        }
        
        function exportData() {
            const csv = [
                ['Time', 'IP', 'Device', 'Screen', 'Browser', 'Platform', 'Language', 'Referrer'].join(','),
                ...allVisitors.map(v => [
                    v.time, v.ip, detectDevice(v.userAgent).type, 
                    v.screen, detectBrowser(v.userAgent), 
                    v.platform, v.language, `"${v.referrer || ''}"`
                ].join(','))
            ].join('\n');
            
            const blob = new Blob([csv], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `visitors_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }
        
        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterData);
        document.getElementById('deviceFilter').addEventListener('change', filterData);
        
        // Load on start
        loadData();
        
        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
